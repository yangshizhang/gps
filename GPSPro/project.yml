name: GPSPro
options:
  bundleIdPrefix: com.gpspro
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

targets:
  GPSPro:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gpspro.app
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Resources/Info.plist
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: GPSPro
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "需要定位权限来记录您的行驶路线和速度"
        NSLocationAlwaysAndWhenInUseUsageDescription: "需要定位权限来记录您的行驶路线和速度"
        NSMotionUsageDescription: "需要运动权限来记录加速度数据"