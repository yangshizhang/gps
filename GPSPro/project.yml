name: GPSPro
options:
  bundleIdPrefix: com.gpspro
  deploymentTarget:
    iOS: "17.0"

targets:
  GPSPro:
    type: application
    platform: iOS
    sources: [Sources, Resources]
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.gpspro.app
      SWIFT_VERSION: "5.9"
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_FILE: Resources/Info.plist