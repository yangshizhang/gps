name: GPSPro
options:
  bundleIdPrefix: com.gpspro
  deploymentTarget:
    iOS: "17.0"

targets:
  GPSPro:
    type: application
    platform: iOS
    sources:
      - Sources/App/GPSProApp.swift
      - Sources/Models/Models.swift
      - Sources/Managers/LocationManager.swift
      - Sources/Managers/RecordingManager.swift
      - Sources/Views/ContentView.swift
      - Sources/Views/SpeedometerView.swift
      - Sources/Views/MapView.swift
      - Sources/Views/HistoryView.swift
      - Sources/Views/SettingsView.swift
      - Resources/Info.plist
      - Resources/Assets.xcassets
    settings:
      PRODUCT_NAME: GPSPro
      EXECUTABLE_NAME: GPSPro
      PRODUCT_BUNDLE_IDENTIFIER: com.gpspro.app
      SWIFT_VERSION: "5.9"
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_FILE: Resources/Info.plist
      GENERATE_INFOPLIST_FILE: NO
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
      ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES