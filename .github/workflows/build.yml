name: Build iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode project
        run: |
          cd GPSPro
          xcodegen generate --verbose
          ls -la

      - name: List schemes
        run: |
          cd GPSPro
          xcodebuild -project GPSPro.xcodeproj -list

      - name: Build iOS project
        id: build
        run: |
          cd GPSPro
          xcodebuild -project GPSPro.xcodeproj \
            -scheme GPSPro \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ./build \
            build

      - name: Verify build
        run: |
          cd GPSPro
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          echo "App path: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            ls -la "$APP_PATH/"
            if [ -f "$APP_PATH/GPSPro" ]; then
              echo "SUCCESS: Executable found"
              file "$APP_PATH/GPSPro"
            else
              echo "ERROR: Executable not found"
              find "$APP_PATH" -type f
              exit 1
            fi
          else
            echo "ERROR: No .app found"
            exit 1
          fi

      - name: Create IPA
        id: create_ipa
        run: |
          cd GPSPro
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/GPSPro.app
          zip -r GPSPro.ipa Payload
          ls -la GPSPro.ipa
          echo "ipa_created=true" >> $GITHUB_OUTPUT

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GPSPro-ipa
          path: GPSPro/GPSPro.ipa