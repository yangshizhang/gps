name: Build iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          which xcodegen && xcodegen --version || echo "XcodeGen not found, will install"
          brew install xcodegen
          xcodegen --version

      - name: Check project.yml
        run: |
          echo "=== project.yml contents ==="
          cat GPSPro/project.yml

      - name: Generate Xcode project
        run: |
          cd GPSPro
          pwd
          ls -la
          xcodegen generate 2>&1
          ls -la

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Build iOS project
        run: |
          cd GPSPro
          xcodebuild -project GPSPro.xcodeproj \
            -scheme GPSPro \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -100

      - name: Create unsigned IPA
        id: create_ipa
        run: |
          cd GPSPro
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Creating IPA from $APP_PATH"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r GPSPro.ipa Payload
            ls -la GPSPro.ipa
            echo "ipa_created=true" >> $GITHUB_OUTPUT
          else
            echo "No .app found"
            echo "ipa_created=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload IPA artifact
        if: steps.create_ipa.outputs.ipa_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: GPSPro-unsigned-ipa
          path: GPSPro/GPSPro.ipa