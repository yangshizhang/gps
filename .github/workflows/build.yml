name: Build iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode project
        run: |
          cd GPSPro
          xcodegen generate
          echo "=== Project files ==="
          ls -la
          echo "=== Sources ==="
          find Sources -type f
          echo "=== Resources ==="
          find Resources -type f

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Build iOS project
        id: build
        run: |
          cd GPSPro
          echo "=== Available schemes ==="
          xcodebuild -project GPSPro.xcodeproj -list
          echo ""
          echo "=== Building ==="
          xcodebuild -project GPSPro.xcodeproj \
            -scheme GPSPro \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ./build \
            PRODUCT_NAME=GPSPro \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -300

      - name: Check build output
        run: |
          echo "=== Build products ==="
          ls -laR GPSPro/build/Build/Products/Debug-iphonesimulator/ 2>/dev/null || echo "Debug-iphonesimulator not found"
          APP_PATH=$(find GPSPro/build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "=== App bundle: $APP_PATH ==="
            ls -la "$APP_PATH/"
            echo "=== Executable check ==="
            EXEC_NAME=$(defaults read "$APP_PATH/Info.plist" CFBundleExecutable 2>/dev/null || echo "GPSPro")
            echo "Expected executable name from plist: $EXEC_NAME"
            ls -la "$APP_PATH/GPSPro" 2>/dev/null || echo "GPSPro executable not found"
            ls -la "$APP_PATH/$EXEC_NAME" 2>/dev/null || echo "$EXEC_NAME executable not found"
          else
            echo "ERROR: No .app found at all. Searching broader..."
            find GPSPro/build -type f 2>/dev/null | head -30
          fi

      - name: Create unsigned IPA
        id: create_ipa
        run: |
          cd GPSPro
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Creating IPA from: $APP_PATH"
            EXEC_CHECK=$(ls "$APP_PATH/GPSPro" 2>/dev/null || echo "")
            if [ -z "$EXEC_CHECK" ]; then
              echo "WARNING: No GPSPro executable in app bundle!"
              find "$APP_PATH" -type f -maxdepth 1
            fi
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/GPSPro.app
            zip -r GPSPro.ipa Payload
            ls -la GPSPro.ipa
            echo "ipa_created=true" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No .app found in build output"
            ls -laR build/ 2>/dev/null | head -100
            echo "ipa_created=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload IPA artifact
        if: steps.create_ipa.outputs.ipa_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: GPSPro-unsigned-ipa
          path: GPSPro/GPSPro.ipa
