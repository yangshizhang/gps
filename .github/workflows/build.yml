name: Build iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode project
        run: |
          cd GPSPro
          xcodegen generate
          ls -la

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Build iOS project
        id: build
        run: |
          cd GPSPro
          xcodebuild -project GPSPro.xcodeproj \
            -scheme GPSPro \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -200

      - name: Check build output
        run: |
          echo "=== Checking build products ==="
          ls -laR GPSPro/build/Build/Products/Debug-iphonesimulator/ 2>/dev/null | head -50
          APP_PATH=$(find GPSPro/build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "=== App bundle contents ==="
            ls -la "$APP_PATH/"
            echo "=== Executable check ==="
            ls -la "$APP_PATH/GPSPro" 2>/dev/null || echo "GPSPro executable not found"
          fi

      - name: Create unsigned IPA
        id: create_ipa
        run: |
          cd GPSPro
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Creating IPA from: $APP_PATH"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/GPSPro.app
            cd Payload
            zip -r ../GPSPro.ipa GPSPro.app
            cd ..
            ls -la GPSPro.ipa
            echo "ipa_created=true" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No .app found in build output"
            ls -laR build/ 2>/dev/null | head -100
            echo "ipa_created=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload IPA artifact
        if: steps.create_ipa.outputs.ipa_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: GPSPro-unsigned-ipa
          path: GPSPro/GPSPro.ipa