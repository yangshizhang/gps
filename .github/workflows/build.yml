name: Build iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            echo "Installing XcodeGen..."
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project
        run: |
          cd GPSPro
          xcodegen generate

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Build iOS project
        run: |
          cd GPSPro
          xcodebuild -project GPSPro.xcodeproj \
            -scheme GPSPro \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -50

      - name: Verify build output
        run: |
          ls -la GPSPro/build/Build/Products/Debug-iphonesimulator/ 2>/dev/null || echo "Checking for .app..."
          find GPSPro/build -name "*.app" -type d 2>/dev/null | head -5

      - name: Create unsigned IPA
        id: create_ipa
        run: |
          APP_PATH=$(find GPSPro/build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            IPA_NAME="GPSPro.ipa"
            echo "Creating $IPA_NAME from $APP_PATH"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r "$IPA_NAME" Payload
            ls -la "$IPA_NAME"
            echo "ipa_created=true" >> $GITHUB_OUTPUT
          else
            echo "No .app found, checking build logs..."
            echo "ipa_created=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload IPA artifact
        if: steps.create_ipa.outputs.ipa_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: GPSPro-unsigned-ipa
          path: GPSPro.ipa

      - name: Upload build products
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-products
          path: GPSPro/build/Build/Products/
          retention-days: 5